<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan SDN Kandang Panjang 02</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; }
        .header img { width: 80px; height: auto; margin-bottom: 15px; }
        .header h2 { font-size: 1.4rem; color: #333; margin-bottom: 5px; }
        .header h3 { font-size: 1.1rem; color: #0056b3; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .form-group input:focus { border-color: #0056b3; outline: none; }
        button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        button:hover { background: #004085; }
        
        /* Jendela Pop-up / Modal */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background-color: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; position: relative; animation: popup 0.3s ease-out; }
        @keyframes popup { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; font-weight: bold; color: #aaa; cursor: pointer; }
        .close-btn:hover { color: black; }
        .modal-title { text-align: center; font-size: 1.3rem; margin-bottom: 20px; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .result-table { width: 100%; margin-bottom: 20px; }
        .result-table td { padding: 8px 0; font-size: 1rem; }
        .result-table td:first-child { font-weight: 600; color: #666; width: 35%; }
        .status-box { text-align: center; padding: 15px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; margin-top: 15px; }
        .lulus { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .tidak-lulus { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        /* Loading animation */
        .loading { display: none; margin-top: 10px; color: #666; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/9c/Logo_Tut_Wuri_Handayani.png" alt="Logo Sekolah">
            <h2>PENGUMUMAN KELULUSAN</h2>
            <h3>SDN Kandang Panjang 02</h3>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Silakan masukkan NISN siswa untuk melihat status kelulusan.</p>
        </div>

        <div class="form-group">
            <label for="nisnInput">NISN Siswa :</label>
            <input type="number" id="nisnInput" placeholder="Contoh: 0123456789" required>
        </div>

        <button id="btnCek" onclick="cekKelulusan()">Cek Status</button>
        <div id="loadingText" class="loading">Sedang mencari data... mohon tunggu...</div>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="tutupModal()">&times;</span>
            <div class="modal-title">Hasil Kelulusan</div>
            
            <table class="result-table">
                <tr><td>Nama</td><td>: <span id="resNama"></span></td></tr>
                <tr><td>NISN</td><td>: <span id="resNisn"></span></td></tr>
                <tr><td>NISI</td><td>: <span id="resNisi"></span></td></tr>
                <tr><td>Kelas</td><td>: <span id="resKelas"></span></td></tr>
            </table>

            <div id="resStatus" class="status-box"></div>
        </div>
    </div>

    <script>
        function cekKelulusan() {
            const inputNisn = document.getElementById("nisnInput").value.trim();
            const btn = document.getElementById("btnCek");
            const loading = document.getElementById("loadingText");
            
            if (inputNisn === "") {
                alert("Harap masukkan NISN terlebih dahulu!");
                return;
            }

            // Jalankan animasi loading
            btn.disabled = true;
            loading.style.display = "block";

            // URL Web App Google Apps Script Anda
            const webAppUrl = "https://script.google.com/macros/library/d/1RkTecllVTcsCFV0MSZ3NJEupcDJbE1b62JvVSgYtMk5gbqmmuOaIJ7T2/2";

            // Mengambil data dari Google Sheet secara realtime
            fetch(`${webAppUrl}?nisn=${inputNisn}`)
                .then(response => response.json())
                .then(data => {
                    btn.disabled = false;
                    loading.style.display = "none";

                    if (data.status === "found") {
                        document.getElementById("resNama").innerText = data.nama;
                        document.getElementById("resNisn").innerText = data.nisn;
                        document.getElementById("resNisi").innerText = data.nisi;
                        document.getElementById("resKelas").innerText = data.kelas;
                        
                        const statusBox = document.getElementById("resStatus");
                        statusBox.innerText = data.keterangan;

                        if (data.keterangan.toUpperCase() === "LULUS") {
                            statusBox.className = "status-box lulus";
                        } else {
                            statusBox.className = "status-box tidak-lulus";
                        }

                        document.getElementById("resultModal").style.display = "flex";
                    } else {
                        alert("Data NISN tidak ditemukan atau salah. Mohon periksa kembali.");
                    }
                })
                .catch(error => {
                    btn.disabled = false;
                    loading.style.display = "none";
                    console.error("Error:", error);
                    alert("Terjadi kesalahan sistem saat mengambil data.");
                });
        }

        function tutupModal() {
            document.getElementById("resultModal").style.display = "none";
            document.getElementById("nisnInput").value = "";
        }

        window.onclick = function(event) {
            const modal = document.getElementById("resultModal");
            if (event.target == modal) { tutupModal(); }
        }
    </script>
</body>
</html>
